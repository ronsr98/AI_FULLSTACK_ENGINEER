<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive - Exercise 1</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; padding: 40px; }
    h1 { font-size: 1.3rem; color: #333333; }
    p  { color: #666666; }

    /* Mobile-first: default (screens smaller than 768px) -> 100% width, red */
    .box {
      width: 100%;
      background: #e74c3c;
      height: 200px;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      border-radius: 8px;
    }

    /* Desktop: bigger than 768px -> 300px wide, blue */
    @media (min-width: 768px) {
      .box {
        width: 300px;
        background: #2563eb;
      }
    }
  </style>
</head>
<body>
  <h1>Exercise 1 — Responsive Box</h1>
  <p>Resize the window. Below 768px the box is full width and red; at 768px and up it becomes 300px wide and blue.</p>
  <div class="box">Resize me</div>
</body>
</html>
