<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Flow - Posts</title>
  <style>
    body { font-family: sans-serif; max-width: 500px; margin: 40px auto; }
    input { display: block; margin: 6px 0; padding: 6px; width: 100%; }
    .post { border: 1px solid #ccc; border-radius: 6px; padding: 8px 12px; margin: 8px 0; }

</head>
<body>
  <h1>Posts</h1>

  <input id="name" type="text" placeholder="name">
  <input id="text" type="text" placeholder="text">
  <button id="submit">Add post</button>

  <div id="posts"></div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
