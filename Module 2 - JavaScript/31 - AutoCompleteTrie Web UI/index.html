<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AutoComplete Trie</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>AutoComplete Trie</h1>

  <div class="search-wrap">
    <input id="wordInput" type="text" placeholder="Type a word...">
    <button id="addBtn">Add word</button>
    <ul id="suggestions"></ul>
  </div>

  <p id="message"></p>
  <div id="dictionary"><strong>Dictionary:</strong> (empty)</div>

  <script src="AutoCompleteTrie.js"></script>
  <script src="app.js"></script>
</body>
</html>
