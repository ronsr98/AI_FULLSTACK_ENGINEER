<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Visual Overload</title>
  <link rel="stylesheet" href="visual-overload.css">
</head>
<body>
  <h1>Hover over the boxes</h1>
  <!-- the only div in the body; the rest are generated by JS -->
  <div id="container"></div>

  <script>
    const container = document.getElementById("container");

    function randomColor() {
      return "#" + Math.floor(Math.random() * 16777215).toString(16).padStart(6, "0");
    }

    for (let i = 0; i < 100; i++) {
      const box = document.createElement("div");
      box.className = "box";
      // each box changes to a random color when the mouse enters it
      box.onmouseenter = function () {
        this.style.backgroundColor = randomColor();
      };
      container.appendChild(box);
    }
  </script>
</body>
</html>
