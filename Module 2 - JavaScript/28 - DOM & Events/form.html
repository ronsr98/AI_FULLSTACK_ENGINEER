<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up Form</title>
  <style>
    body { font-family: sans-serif; max-width: 380px; margin: 40px auto; }
    input { display: block; width: 100%; padding: 8px; margin: 6px 0; box-sizing: border-box; }
    button { padding: 8px 16px; }
    .error { color: #e74c3c; margin: 2px 0; }
    .success { color: #27ae60; font-weight: bold; }
  </style>
</head>
<body>
  <h1>Sign Up</h1>
  <input id="name" type="text" placeholder="Name">
  <input id="salary" type="number" placeholder="Salary">
  <input id="birthday" type="date">
  <input id="phone" type="text" placeholder="Phone (10 digits)">
  <button id="submit">Submit</button>
  <div id="messages"></div>

  <script>
    function validate() {
      const name = document.getElementById("name").value;
      const salary = Number(document.getElementById("salary").value);
      const birthday = document.getElementById("birthday").value;
      const phone = document.getElementById("phone").value;

      const errors = [];
      if (name.length <= 2) errors.push("Name must be longer than 2 characters");
      if (!(salary > 10000 && salary < 16000)) errors.push("Salary must be between 10,000 and 16,000");
      if (!birthday) errors.push("Birthday is required");
      if (!/^\d{10}$/.test(phone)) errors.push("Phone must be 10 digits long");

      const messages = document.getElementById("messages");
      messages.innerHTML = "";

      if (errors.length === 0) {
        const ok = document.createElement("p");
        ok.className = "success";
        ok.textContent = "Welcome, " + name + "!";
        messages.appendChild(ok);
      } else {
        errors.forEach((err) => {
          const p = document.createElement("p");
          p.className = "error";
          p.textContent = err;
          messages.appendChild(p);
        });
      }
    }

    document.getElementById("submit").addEventListener("click", validate);
  </script>
</body>
</html>
