<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Exercise 1</title>

  <!-- 3 fonts from Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Lobster&family=Roboto&family=Courier+Prime&display=swap" rel="stylesheet">

  <style>
    body {
      background-color: #f4f1ea;
      text-align: center;
      padding-top: 60px;
    }

    .line1 {
      font-family: 'Lobster', cursive;
      font-size: 50px;
      color: #2b2b2b;
    }

    .line2 {
      font-family: 'Roboto', sans-serif;
      font-size: 30px;
      color: #e07a5f;
    }

    .line3 {
      font-family: 'Courier Prime', monospace;
      font-size: 18px;
      color: #3d8a8a;
    }
  </style>
</head>
<body>
  <p class="line1">Big, bold and beautiful.</p>
  <p class="line2">A little smaller, in a different mood.</p>
  <p class="line3">and the smallest one, typed like code</p>
</body>
</html>
