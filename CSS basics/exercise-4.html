<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Exercise 4</title>

  <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Roboto', sans-serif;
      background-color: #e9ecf3;
    }

    /* the card, centered with margin: auto */
    #container {
      background-color: #ffffff;
      width: 300px;
      margin: 80px auto;
      padding: 30px;
      border-radius: 16px;
      border: 1px solid #d8dde8;
      box-shadow: 0 15px 35px rgba(40, 55, 90, 0.18);
      text-align: center;
    }

    /* a span is inline, so we change it to inline-block to give it width/height */
    .box {
      display: inline-block;
      width: 40px;
      height: 40px;
      border-radius: 8px;
      margin: 5px;
    }

    #first {
      background-color: #6c5ce7;
    }

    #second {
      background-color: #00b894;
    }

    .prompt {
      text-align: left;
      margin-top: 15px;
      margin-bottom: 5px;
    }

    input {
      display: block;
      padding: 10px;
      margin-bottom: 10px;
      border: 2px solid #d8dde8;
      border-radius: 8px;
    }

    .button {
      display: block;
      padding: 12px;
      margin-top: 15px;
      border: none;
      border-radius: 8px;
      background-color: #6c5ce7;
      color: #ffffff;
      font-size: 16px;
      box-shadow: 0 8px 18px rgba(108, 92, 231, 0.45);
    }
  </style>
</head>
<body>
  <!-- this is the given HTML, only CSS was added -->
  <div id="container">
    <span class="box" id="first"></span>
    <span class="box" id="second"></span>
    <div class="prompt">Name:</div>
    <input type="text" placeholder="Your name">
    <div class="prompt">Age:</div>
    <input type="number" placeholder="How old?">
    <button class="button">Win</button>
  </div>
</body>
</html>
