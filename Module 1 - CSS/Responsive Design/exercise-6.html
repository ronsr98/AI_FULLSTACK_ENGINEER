<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive - Exercise 6 (Product Card, Tailwind)</title>
  <!-- Bonus: Tailwind via Play CDN, zero CSS of our own -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex items-center justify-center p-8 bg-gradient-to-br from-[#6d7ce0] to-[#8257c5] font-sans">

  <div class="w-full max-w-[900px] bg-white rounded-2xl overflow-hidden shadow-2xl flex flex-col min-[900px]:flex-row">

    <!-- media panel -->
    <div class="bg-gradient-to-br from-[#6173d8] to-[#8a59c4] min-h-[220px] flex items-center justify-center min-[900px]:flex-[0_0_42%] min-[900px]:min-h-0">
      <div class="w-28 h-28 rounded-full bg-white/20 flex items-center justify-center">
        <svg viewBox="0 0 24 24" class="w-12 h-12 fill-white/90"><path d="M9 3l-1.8 2H4a2 2 0 0 0-2 2v11a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-3.2L15 3H9zm3 5a5 5 0 1 1 0 10 5 5 0 0 1 0-10zm0 2a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"/></svg>
      </div>
    </div>

    <!-- content -->
    <div class="p-8 text-center min-[600px]:text-left min-[900px]:flex-1 min-[900px]:p-10">
      <h2 class="text-2xl min-[600px]:text-3xl min-[900px]:text-[2.3rem] font-bold text-gray-800 mb-4">Premium Laptop</h2>
      <p class="text-gray-500 leading-relaxed mb-6">High-performance laptop perfect for developers and designers. Features the latest processor, ample RAM, and a stunning display that brings your work to life.</p>
      <div class="flex flex-col items-center gap-4 min-[600px]:flex-row min-[600px]:justify-between">
        <span class="text-[#e2543d] font-bold text-3xl min-[900px]:text-[2rem]">$1,299</span>
        <button class="w-full text-center min-[600px]:w-auto px-6 py-3 rounded-[10px] text-white font-bold bg-gradient-to-br from-[#6173d8] to-[#8a59c4]">Add to Cart</button>
      </div>
    </div>

  </div>

</body>
</html>
