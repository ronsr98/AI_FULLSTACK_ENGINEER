<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Exercise 7</title>

  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700&display=swap" rel="stylesheet">

  <style>
    /* an image from the internet on the body background */
    body {
      font-family: 'Roboto', sans-serif;
      background-image: url("https://loremflickr.com/1200/800/landscape,mountains");
      background-size: cover;
      text-align: center;
      padding-top: 100px;
    }

    /* TITLE 1 - transparent.
       No background color, and the text color is see-through (low opacity),
       so the background image shows through it. */
    .transparent {
      background-color: transparent;
      color: rgba(255, 255, 255, 0.4);
      font-size: 50px;
      padding: 20px;
    }

    /* TITLE 2 - opaque.
       A solid background color, so the image behind it cannot be seen. */
    .opaque {
      background-color: #1a1a2e;
      color: #ffffff;
      font-size: 50px;
      width: 400px;
      margin: 30px auto;
      padding: 20px;
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <h1 class="transparent">I'm see-through</h1>
  <h1 class="opaque">I'm solid</h1>
</body>
</html>
