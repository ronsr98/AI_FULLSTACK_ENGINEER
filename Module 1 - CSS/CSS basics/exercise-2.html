<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Exercise 2</title>

  <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Roboto', sans-serif;
      background-color: #11151c;
      text-align: center;
    }

    h1 {
      color: #ffffff;
      padding-top: 40px;
    }

    /* display: block makes the whole box clickable, not just the text */
    a {
      display: block;
      width: 350px;
      margin: 15px auto;
      background-color: #1c2230;
      color: #ffffff;
      text-decoration: none;
      padding: 20px;
      border: 1px solid #2d3548;
      border-radius: 12px;
      font-size: 18px;
    }

    a:hover {
      background-color: #2a3247;
    }

    .url {
      color: #8c9bb5;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h1>My Favorite Sites</h1>

  <!-- target="_blank" opens the link in a new tab -->
  <a href="https://www.ynet.co.il" target="_blank">
    News <br>
    <span class="url">ynet.co.il</span>
  </a>

  <a href="https://www.youtube.com" target="_blank">
    YouTube <br>
    <span class="url">youtube.com</span>
  </a>

  <a href="https://www.facebook.com" target="_blank">
    Facebook <br>
    <span class="url">facebook.com</span>
  </a>
</body>
</html>
