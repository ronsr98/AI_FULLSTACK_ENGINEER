<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Exercise 3</title>

  <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Roboto', sans-serif;
      background-color: #f4f1ea;
      text-align: center;
      padding-top: 50px;
    }

    h1 {
      color: #2b2b2b;
      margin-bottom: 40px;
    }

    /* the images are the links */
    img {
      width: 90px;
      height: 90px;
      margin: 0 20px;
      border-radius: 18px;
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.2);
    }
  </style>
</head>
<body>
  <h1>Click an icon to visit the site</h1>

  <!-- the IMAGE is inside the link, and target="_blank" opens a new tab -->
  <a href="https://www.ynet.co.il" target="_blank">
    <img src="https://www.google.com/s2/favicons?sz=128&domain=ynet.co.il" alt="News">
  </a>

  <a href="https://www.youtube.com" target="_blank">
    <img src="https://www.google.com/s2/favicons?sz=128&domain=youtube.com" alt="YouTube">
  </a>

  <a href="https://www.facebook.com" target="_blank">
    <img src="https://www.google.com/s2/favicons?sz=128&domain=facebook.com" alt="Facebook">
  </a>
</body>
</html>
