<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Positioning - Exercise 1</title>
  <style>
    body { font-family: Georgia, "Times New Roman", serif; }

    /* Page heading, top-left of the page */
    h1 {
      font-weight: bold;
      margin: 16px;
    }

    /* The container holds the image + the 4 corner texts.
       position: relative makes it the "frame of reference"
       for the absolutely-positioned texts inside it. */
    .container {
      position: relative;

      /* Responsive: shrinks with the page but never wider than this. */
      max-width: 400px;
      width: 100%;

      /* margin: auto  ->  centers the container horizontally on the page */
      margin: auto;
    }

    /* The image fills the container width and scales with it.
       display: block removes the tiny gap browsers add under images. */
    .container img {
      width: 100%;
      display: block;
    }

    /* Each label is absolute -> positioned against the container's edges.
       Since those edges scale with the image, the texts STAY in the
       corners when the image is resized. */
    .corner {
      position: absolute;
      color: #000000;
      font-size: 13px;
      padding: 2px 4px;
    }

    .top-left     { top: 0;    left: 0;  }
    .top-right    { top: 0;    right: 0; }
    .bottom-left  { bottom: 0; left: 0;  }
    .bottom-right { bottom: 0; right: 0; }
  </style>
</head>

  <h1>Texts on Image!</h1>

  <div class="container">
